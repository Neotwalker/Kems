<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 650 560" role="img" aria-labelledby="title desc">
  <title id="title">Тату машинка и рекламная система</title>
  <desc id="desc">Абстрактная 3D иллюстрация тату машинки, лидов и аналитики в тёмной неоновой стилистике.</desc>
  <defs>
    <radialGradient id="bg" cx="52%" cy="35%" r="62%">
      <stop offset="0" stop-color="#33204d"/>
      <stop offset="0.48" stop-color="#12091e"/>
      <stop offset="1" stop-color="#08050d"/>
    </radialGradient>
    <linearGradient id="pink" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff"/>
      <stop offset="0.2" stop-color="#12f7d6"/>
      <stop offset="0.58" stop-color="#ff3d81"/>
      <stop offset="1" stop-color="#7c4dff"/>
    </linearGradient>
    <linearGradient id="metal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8f0ff"/>
      <stop offset="0.26" stop-color="#8b7aa3"/>
      <stop offset="0.58" stop-color="#30203f"/>
      <stop offset="1" stop-color="#110818"/>
    </linearGradient>
    <filter id="shadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="24" stdDeviation="24" flood-color="#000" flood-opacity="0.48"/>
    </filter>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="650" height="560" fill="url(#bg)"/>
  <g opacity="0.45">
    <circle cx="324" cy="280" r="220" fill="none" stroke="#fff" stroke-opacity="0.08"/>
    <ellipse cx="324" cy="280" rx="285" ry="92" fill="none" stroke="#12f7d6" stroke-opacity="0.16" transform="rotate(-15 324 280)"/>
    <ellipse cx="324" cy="280" rx="250" ry="74" fill="none" stroke="#ff3d81" stroke-opacity="0.13" transform="rotate(20 324 280)"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="365" y="110" width="176" height="250" rx="28" fill="#150d22" stroke="#fff" stroke-opacity="0.14"/>
    <rect x="388" y="139" width="130" height="30" rx="15" fill="#241633"/>
    <rect x="388" y="188" width="54" height="118" rx="15" fill="#ff3d81" opacity="0.82"/>
    <rect x="456" y="226" width="54" height="80" rx="15" fill="#12f7d6" opacity="0.82"/>
    <path d="M391 333c18-28 36-18 50-40 16-25 24-58 45-60 20-2 25 26 30 48" fill="none" stroke="url(#pink)" stroke-width="8" stroke-linecap="round"/>
    <circle cx="409" cy="388" r="16" fill="#12f7d6" filter="url(#glow)"/>
    <circle cx="466" cy="388" r="16" fill="#ff3d81" filter="url(#glow)"/>
    <circle cx="523" cy="388" r="16" fill="#7c4dff" filter="url(#glow)"/>
  </g>

  <g transform="translate(82 130) rotate(-12 220 160)" filter="url(#shadow)">
    <path d="M205 93c19-30 61-40 93-22l34 19c34 19 46 62 27 96l-56 99c-19 34-62 46-96 27l-34-19c-32-18-45-57-30-90" fill="url(#metal)" stroke="#fff" stroke-opacity="0.22" stroke-width="2"/>
    <path d="M161 128c26-46 85-62 131-36l10 6c46 26 62 85 36 131l-15 27c-27 47-86 63-132 36l-10-5c-46-27-62-85-36-132l16-27Z" fill="#1a1029" stroke="url(#pink)" stroke-width="8"/>
    <path d="M188 142c18-31 58-42 90-24l10 6c31 18 42 59 24 90l-14 25c-18 31-59 42-90 24l-10-6c-31-18-42-58-24-90l14-25Z" fill="#09050e"/>
    <rect x="252" y="4" width="48" height="110" rx="17" fill="url(#metal)" transform="rotate(30 276 59)"/>
    <rect x="294" y="44" width="108" height="43" rx="18" fill="url(#pink)" transform="rotate(30 348 66)"/>
    <path d="M124 241l-76 134" stroke="url(#metal)" stroke-width="26" stroke-linecap="round"/>
    <path d="M51 381l-19 34" stroke="#12f7d6" stroke-width="8" stroke-linecap="round" filter="url(#glow)"/>
    <path d="M134 233l-45 79" stroke="#ff3d81" stroke-width="10" stroke-linecap="round" opacity="0.65"/>
    <circle cx="234" cy="192" r="38" fill="url(#pink)" opacity="0.95"/>
    <circle cx="234" cy="192" r="18" fill="#100718"/>
  </g>

  <g filter="url(#glow)">
    <circle cx="96" cy="104" r="7" fill="#12f7d6"/>
    <circle cx="566" cy="100" r="6" fill="#ff3d81"/>
    <circle cx="552" cy="460" r="8" fill="#12f7d6"/>
    <circle cx="112" cy="448" r="6" fill="#7c4dff"/>
  </g>
</svg>
